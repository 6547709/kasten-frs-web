{{define "sessions_body"}}<table class="simple-table">
  <thead>
    <tr>
      <th style="width:80px">State</th>
      <th style="width:22%">FRS Name</th>
      <th style="width:18%">Namespace</th>
      <th>Expires</th>
      <th style="text-align:right; padding-right:18px">Action</th>
    </tr>
  </thead>
  <tbody>
    {{range .FRS}}
    <tr>
      <td><span class="badge {{.State | lower}}">{{.State}}</span></td>
      <td><strong>{{.Ref.Name}}</strong></td>
      <td>{{.Ref.Namespace}}</td>
      <td>{{.ExpiryTime.Format "2006-01-02 15:04:05"}}</td>
      <td class="action">
        <form method="post" action="/sessions/{{.Ref.Namespace}}/{{.Ref.Name}}/connect">
          <button type="submit">浏览 ›</button>
        </form>
      </td>
    </tr>
    {{else}}
    <tr><td colspan="5" style="text-align:center; padding:30px; color:#6B7480; font-style:italic">暂无可用 FRS 会话</td></tr>
    {{end}}
  </tbody>
</table>{{end}}
