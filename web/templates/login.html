{{define "login_body"}}<form class="login-card" method="post" action="/login">
  <div class="brand">Kasten <span class="accent">FRS</span> Web Helper</div>
  <p class="sub">登录后浏览 FRS (文件恢复会话) 目录树。<br>支持 SFTP 协议 — 需先用 k10tools 创建 FRS 会话。</p>
  <label for="username">用户名</label>
  <input id="username" name="username" required autocomplete="username" autofocus>
  <label for="password">密码</label>
  <input id="password" name="password" type="password" required autocomplete="current-password">
  {{if .Error}}<p class="err">{{.Error}}</p>{{end}}
  <button type="submit">登 录</button>
  <p class="hint">需 kasten-frs-web-helper-credentials Secret 配置</p>
</form>{{end}}
