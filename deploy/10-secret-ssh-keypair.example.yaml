apiVersion: v1
kind: Secret
metadata:
  annotations:
  name: kasten-frs-helper-private-key
  namespace: kasten-io
type: kubernetes.io/ssh-auth
# This is a pre-baked ed25519 SSH keypair so the helper can boot
# on the very first start without needing to talk to the API
# server's create-Secrets endpoint (which is sometimes blocked
# by NetworkPolicy, RBAC hardening, or Compliance Operator
# default-deny-all on the Secret resource).
#
# The keypair here is meant for FIRST-INSTALL and TESTING. For
# production, generate your own and replace the data fields
# before applying:
#
#   ssh-keygen -t ed25519 -N '' -f kasten-frs-helper -C kasten-frs-web-helper
#   PRIV=$(base64 -w0 kasten-frs-helper)
#   PUB=$(base64 -w0 kasten-frs-helper.pub)
#   oc -n kasten-io create secret generic kasten-frs-helper-private-key \
#     --type=kubernetes.io/ssh-auth \
#     --from-file=ssh-privatekey=kasten-frs-helper \
#     --from-file=ssh-publickey=kasten-frs-helper.pub \
#     --dry-run=client -o yaml | oc apply -f -
#
# Once the Secret is in place, the helper's keymgr LoadOrGenerate
# code path sees both halves present, takes the "parseInto" branch,
# and never issues a secrets.Create call. So even if the helper
# SA loses the create-Secrets RBAC grant, the helper still boots.
data:
  ssh-privatekey: 
  ssh-publickey: 
