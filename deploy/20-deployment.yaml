apiVersion: apps/v1
kind: Deployment
metadata:
  name: kasten-frs-web-helper
  namespace: kasten-io
  labels:
    app: kasten-frs-web-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kasten-frs-web-helper
  template:
    metadata:
      labels:
        app: kasten-frs-web-helper
    spec:
      serviceAccountName: kasten-frs-web-helper
      # OCP restricted-v2 SCC requires runAsUser to fall inside the
      # namespace's allocated UID range (MustRunAsRange); pinning
      # runAsUser: 1001 fails admission in `kasten-io` because the
      # range is 1001100000/10000. Let the SCC pick a UID, and pin
      # fsGroup to the range base so /tmp and /app/.cache emptyDirs
      # are writable for the chosen user. See spec doc for details.
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001100000
        seccompProfile: { type: RuntimeDefault }
      containers:
      - name: helper
        image: ghcr.io/6547709/kasten-frs-web:v0.3.27
        imagePullPolicy: IfNotPresent
        ports:
        - { name: http, containerPort: 8080 }
        envFrom:
        - secretRef:
            name: kasten-frs-web-helper-credentials
        env:
        - { name: HELPER_PORT, value: "8080" }
        - { name: HELPER_LISTEN, value: "0.0.0.0" }
        - { name: HELPER_K8S_INCLUSTER, value: "true" }
        - { name: HELPER_LOG_LEVEL, value: "info" }
        - { name: HELPER_FRS_DEFAULT_USERNAME, value: "root" }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
        readinessProbe:
          httpGet: { path: /readyz, port: http }
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /healthz, port: http }
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        volumeMounts:
        - { name: tmp, mountPath: /tmp }
        - { name: cache, mountPath: /app/.cache }
      volumes:
      - { name: tmp, emptyDir: { sizeLimit: 100Mi } }
      - { name: cache, emptyDir: { sizeLimit: 50Mi } }
