apiVersion: apps/v1
kind: Deployment
metadata:
  name: kasten-frs-web-helper
  namespace: kasten-io
  labels:
    app: kasten-frs-web-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kasten-frs-web-helper
  template:
    metadata:
      labels:
        app: kasten-frs-web-helper
    spec:
      serviceAccountName: kasten-frs-web-helper
      # OCP restricted-v2 SCC requires runAsUser to fall inside the
      # namespace's allocated UID range (MustRunAsRange); pinning
      # runAsUser: 1001 fails admission in `kasten-io` because the
      # range is 1001100000/10000. Let the SCC pick a UID. Same
      # logic applies to fsGroup — let the SCC pick it so the
      # chosen fsGroup lines up with the chosen runAsUser (and
      # therefore with the emptyDir volumes the pod mounts at
      # /tmp and /app/.cache). Pinning fsGroup here was causing
      # admission failures in some clusters where the chosen
      # runAsUser and the pinned fsGroup landed on opposite
      # sides of the SCC's MustRunAsRange constraint.
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
      - name: helper
        image: ghcr.io/6547709/kasten-frs-web:v0.3.33
        imagePullPolicy: IfNotPresent
        ports:
        - { name: http, containerPort: 8080 }
        envFrom:
        - secretRef:
            name: kasten-frs-web-helper-credentials
        env:
        - { name: HELPER_PORT, value: "8080" }
        - { name: HELPER_LISTEN, value: "0.0.0.0" }
        - { name: HELPER_K8S_INCLUSTER, value: "true" }
        - { name: HELPER_LOG_LEVEL, value: "info" }
        - { name: HELPER_FRS_DEFAULT_USERNAME, value: "root" }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
        # Probes:
        #   - startupProbe: gives the helper up to 5 minutes to come
        #     up. Long enough to ride out a keymgr Get that hits a
        #     30s TCP timeout (i.e. a NetworkPolicy that was supposed
        #     to allow egress but doesn't). The previous config had
        #     no startupProbe and a 10s livenessProbe, which meant a
        #     single 30s i/o timeout during first boot would have
        #     kubelet kill the pod before keymgr had a chance to
        #     error out. With startupProbe, the liveness/readiness
        #     timers don't even start counting until startupProbe
        #     succeeds, so a slow first boot doesn't cascade into
        #     CrashLoopBackOff.
        #   - readinessProbe: 5s after startup succeeds, then every
        #     10s. The Route + load balancer only route traffic to
        #     pods that pass readiness, so this gates the user-
        #     visible "is the helper up" check.
        #   - livenessProbe: 30s after startup succeeds, then every
        #     60s. Restart the pod only if /healthz genuinely stops
        #     responding; the long period avoids restart-loops on
        #     transient blips.
        startupProbe:
          httpGet: { path: /readyz, port: http }
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /readyz, port: http }
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /healthz, port: http }
          periodSeconds: 60
          failureThreshold: 3
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        volumeMounts:
        - { name: tmp, mountPath: /tmp }
        - { name: cache, mountPath: /app/.cache }
      volumes:
      - { name: tmp, emptyDir: { sizeLimit: 100Mi } }
      - { name: cache, emptyDir: { sizeLimit: 50Mi } }
