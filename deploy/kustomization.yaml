apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kasten-io
commonLabels:
  app: kasten-frs-web-helper
# Pin the image centrally so `oc apply -k deploy/` always rolls out a
# known release instead of whatever tag is baked into 20-deployment.yaml
# (which was stuck at v0.1.0). Override newTag — and newName for a
# private registry mirror — here at deploy time.
images:
- name: ghcr.io/6547709/kasten-frs-web
  newTag: v0.3.31
resources:
- 05-serviceaccount.yaml
- 06-rbac.yaml
- 20-deployment.yaml
- 30-service.yaml
- 40-route.yaml
- 50-networkpolicy.yaml
- 55-networkpolicy-helper-access-frs.yaml
# 56-* adds probe ingress + API egress allow-lists on top of
# 50-*. Its service-network + cluster-network ipBlocks assume
# the OCP defaults (172.30.0.0/16 and 10.128.0.0/14); edit
# the file before applying if your install uses different
# CIDRs.
- 56-networkpolicy-helper-probes-and-egress.yaml
# 10-secret.example.yaml is not included; users create it manually.
#
# The kasten-io Namespace is intentionally NOT created here. K10's
# helm chart owns it; if you apply this bundle on a fresh cluster
# without K10 installed, create the namespace manually with:
#   oc create namespace kasten-io
# Also note: do NOT set pod-security.kubernetes.io/enforce on the
# kasten-io namespace to anything stricter than 'privileged' if
# K10's FRS mounter pod will run there — the pod needs
# securityContext.privileged=true to mount FRS volumes on
# OCP. See DEPLOY.md#openshift-securitycontextconstraints.
