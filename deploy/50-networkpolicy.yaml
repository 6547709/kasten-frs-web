apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kasten-frs-web-helper
  namespace: kasten-io
spec:
  podSelector:
    matchLabels:
      app: kasten-frs-web-helper
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
    ports:
    - { port: 8080, protocol: TCP }
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - { port: 443, protocol: TCP }
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - { port: 53, protocol: UDP }
    - { port: 53, protocol: TCP }
  - to:
    - podSelector: {}
    ports:
    - { port: 2222, protocol: TCP }
