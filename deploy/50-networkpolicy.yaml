apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kasten-frs-web-helper
  namespace: kasten-io
spec:
  # Helper pod only. FRS pods are policed by 55-*.yaml — K8s
  # NetworkPolicy can only target one podSelector per resource,
  # so the two concerns (this pod vs FRS pods) must live in
  # separate files.
  podSelector:
    matchLabels:
      app: kasten-frs-web-helper
  policyTypes:
  - Ingress
  - Egress
  # Egress: explicit allow-all. The single empty rule `{}` matches
  # any destination, any port, any protocol — i.e. "all egress
  # traffic is permitted from this pod". We do this rather than
  # omitting Egress from policyTypes because, in K8s, multiple
  # NetworkPolicies are UNION: a namespace-scoped default-deny-
  # egress (e.g. one applied by Compliance Operator or by hand
  # for hardening) will still apply to the helper if our policy
  # is silent on egress. Including an explicit allow-all egress
  # rule here means the helper's outbound traffic is permitted
  # regardless of any default-deny elsewhere in the namespace.
  # The helper is an operator-facing tool; its threat model is
  # "the cluster admin who deploys it", and the admin is in a
  # better position than a static allow-list to decide what
  # egress to permit in their environment.
  egress:
  - {}
  ingress:
  # 1. OCP Router (the Route fronting the helper). Router pods
  #    carry the network.openshift.io/policy-group=ingress
  #    label, so this rule targets them specifically.
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
    ports:
    - { port: 8080, protocol: TCP }
  # 2. kubelet liveness / readiness / startup probes. Probe
  #    source appears as a pod IP for NetworkPolicy purposes
  #    (OVN-K rewrites the source to the helper's host
  #    network's CNI bridge). Allow from any pod on the
  #    helper's HTTP port; the helper's HTTP server is the
  #    only thing listening on 8080 so this doesn't widen the
  #    attack surface beyond what 1. above does.
  - from:
    - podSelector: {}
    - namespaceSelector: {}
    ports:
    - { port: 8080, protocol: TCP }
