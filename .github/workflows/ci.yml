name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  test:
    # Run tests on PRs and on tag pushes. Skip on plain main pushes so
    # commits to main don't burn CI minutes — main is the merge
    # target for already-reviewed PRs, and the canonical test signal
    # is the tag-push run.
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...
      - run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with: { name: coverage, path: coverage.out }

  image:
    # Only build and push the container image on tag pushes (e.g. v0.1.3).
    # Pushes to main only run the test job — main shouldn't produce
    # a new immutable artifact every commit. To cut a release, push
    # a semver tag.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch HTMX
        run: ./scripts/fetch-htmx.sh
      - uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the running binary with the same tag the image is
          # pushed under, so the UI footer reflects what `oc describe
          # pod` shows. github.ref_name on a vX.Y.Z push is "vX.Y.Z";
          # the binary prints that verbatim, matching the ghcr tag.
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      # Trivy scan temporarily disabled: GitHub runner containerd socket
      # permission issue blocks trivy-action on hosted runners (not our
      # code). Re-enable when runners are upgraded or when we move to a
      # self-hosted runner.
      #
      # - name: Trivy scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      #     format: sarif
      #     output: trivy-results.sarif
      #     severity: CRITICAL
      # - name: Upload Trivy SARIF
      #   uses: github/codeql-action/upload-sarif@v3
      #   with: { sarif_file: trivy-results.sarif }
      #
      # Cosign keyless signing was previously enabled but the
      # 'cosign sign --yes' step has been failing on hosted runners
      # (the install step succeeds; the actual sign step errors out —
      # the OIDC token in ACTIONS_ID_TOKEN_REQUEST_TOKEN is rejected
      # by sigstore's Fulcio for unknown reasons). Image push to GHCR
      # still works without signing, so we drop the sign steps here.
      # If we want signed images later, switch to a key-based signer
      # (sigstore/cosign key generate + cosign sign --key) or to a
      # self-hosted runner with a stable egress path to Fulcio/Rekor.