name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...
      - run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with: { name: coverage, path: coverage.out }

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch HTMX
        run: ./scripts/fetch-htmx.sh
      - uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      # Trivy scan temporarily disabled: GitHub runner containerd socket
      # permission issue blocks trivy-action on hosted runners (not our
      # code). Re-enable when runners are upgraded or when we move to a
      # self-hosted runner.
      #
      # - name: Trivy scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      #     format: sarif
      #     output: trivy-results.sarif
      #     severity: CRITICAL
      # - name: Upload Trivy SARIF
      #   if: github.event_name != 'pull_request'
      #   uses: github/codeql-action/upload-sarif@v3
      #   with: { sarif_file: trivy-results.sarif }
      - name: Cosign keyless sign
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3
      - name: Sign
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        env: { COSIGN_EXPERIMENTAL: 1 }
        run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.ref_name }}